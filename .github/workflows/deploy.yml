name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - copilot/investigate-conversation-issues
      - copilot/push-all-data-to-repo
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure GitHub Pages source
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/pages \
            -X POST \
            -f "source[branch]=gh-pages" \
            -f "source[path]=/" \
            2>/dev/null \
          || gh api repos/${{ github.repository }}/pages \
            -X PUT \
            -f "source[branch]=gh-pages" \
            -f "source[path]=/" \
            2>/dev/null \
          || echo "Pages source already configured."

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          enable_jekyll: false
